name: Packaging(Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  installer:
    name: VS 2022 x64-installer
    runs-on: windows-2022
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase'

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DCPACK_GENERATOR=NSIS

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package NSIS installer
        run: |
          cd build
          cpack -G NSIS
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager-Setup.exe
          path: clipboard-manager-qt/build/ClipboardManager-*.exe

  portable:
    name: VS 2022 x64-portable
    runs-on: windows-2022
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase'

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package portable zip
        run: |
          $windeployqt = Get-ChildItem -Path "$env:Qt6_DIR\bin\windeployqt.exe" -Recurse | Select-Object -First 1
          & $windeployqt --release build\Release\clipboard-manager-qt.exe
          Compress-Archive -Path build\Release\* -DestinationPath build\ClipboardManager-Portable.zip
        shell: pwsh

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager-Portable.zip
          path: clipboard-manager-qt/build/ClipboardManager-Portable.zip

  release:
    name: Create GitHub Release
    needs: [installer, portable]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clipboard Manager ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            artifacts/**/*
          generate_release_notes: true
