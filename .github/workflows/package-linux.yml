name: Packaging(Linux)

on:
  push:
    tags:
      - 'v*'

jobs:
  appimage:
    name: Build appimage on ubuntu-24.04
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qt6-base-dev libqt6sql6-sqlite qt6-base-dev-tools cmake g++ file

      - name: Build release binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel $(nproc)

      - name: Bundle AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/64x64/apps
          cp build/clipboard-manager-qt AppDir/usr/bin/
          cp assets/app_icon_64.png AppDir/usr/share/icons/hicolor/64x64/apps/
          cat > AppDir/usr/share/applications/clipboard-manager.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Clipboard Manager
          Exec=clipboard-manager-qt
          Icon=app_icon_64
          Categories=Utility;
          Terminal=false
          EOF

      - name: Build AppImage
        uses: juliano-r/linuxdeployqt-action@v1
        with:
          appdir: clipboard-manager-qt/AppDir
          output: ClipboardManager-x86_64.AppImage
          extra_args: "-bundle-non-qt-libs"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager-x86_64.AppImage
          path: clipboard-manager-qt/ClipboardManager-x86_64.AppImage

  deb:
    strategy:
      matrix:
        include:
          - distro: ubuntu-24.04
            arch: amd64
          - distro: ubuntu-24.04-arm
            arch: arm64
          - distro: debian-13
            arch: amd64
          - distro: debian-13-arm
            arch: arm64
    name: Build deb on ${{ matrix.distro }} ${{ matrix.arch }}
    runs-on: ${{ matrix.distro }}
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qt6-base-dev libqt6sql6-sqlite qt6-base-dev-tools cmake g++

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCPACK_GENERATOR=DEB
          cmake --build build --parallel $(nproc)

      - name: Package .deb
        run: |
          cd build
          cpack -G DEB
          mv *.deb ../ClipboardManager-${{ matrix.arch }}.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager-${{ matrix.arch }}.deb
          path: clipboard-manager-qt/ClipboardManager-${{ matrix.arch }}.deb

  rpm:
    strategy:
      matrix:
        distro: [fedora-43, fedora-44]
    name: Build rpm on ${{ matrix.distro }}
    runs-on: ${{ matrix.distro }}
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo dnf install -y qt6-qtbase-devel qt6-qtsql-devel cmake gcc-c++

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel $(nproc)

      - name: Package .rpm
        run: |
          cd build
          cpack -G RPM
          mv *.rpm ../ClipboardManager.rpm

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager-${{ matrix.distro }}.rpm
          path: clipboard-manager-qt/ClipboardManager.rpm

  flatpak:
    name: Build flatpak on ubuntu-24.04
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak-builder flatpak
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y org.kde.Platform//6.7 org.kde.Sdk//6.7

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean build-flatpak io.qt.ClipboardManager.yml
          flatpak build-export repo build-flatpak
          flatpak build-bundle repo ClipboardManager.flatpak io.qt.ClipboardManager

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager.flatpak
          path: clipboard-manager-qt/ClipboardManager.flatpak

  snap:
    name: Build snap on ubuntu latest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic
          sudo snap install lxd
          sudo lxd.migrate -yes
          sudo usermod -a -G lxd $USER
          sg lxd -c 'snapcraft --use-lxd'

      - name: Upload Snap
        uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager.snap
          path: clipboard-manager-qt/*.snap
