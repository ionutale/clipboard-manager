name: CI

on:
  pull_request:
    paths:
      - 'clipboard-manager-qt/**'
  push:
    branches: [main]
    paths:
      - 'clipboard-manager-qt/**'

jobs:
  build-ubuntu:
    name: Build & Test (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qt6-base-dev libqt6sql6-sqlite qt6-base-dev-tools cmake g++

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Build & Test (Windows 2022 MSVC)
    runs-on: windows-2022
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase'

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: clipboard-manager-qt

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: brew install qt@6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
